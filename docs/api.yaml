openapi: 3.0.3
info:
  title: Shipment API
  description: |
    Minimal REST API for creating and reading shipments.

    This OpenAPI document is derived from docs/SPECS.md in this repository.
  version: 1.0.0
servers:
  - url: /api
    description: Same host (e.g., APIM gateway base URL). The /api path becomes the APIM API URL suffix.
paths:
  /shipments:
    post:
      operationId: createShipment
      summary: Create a shipment
      description: Register a new shipment for delivery.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: Optional idempotency key (UUID recommended).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShipmentRequest"
            examples:
              example:
                value:
                  senderName: 田中太郎
                  recipientName: 佐藤花子
                  from: 東京都千代田区
                  to: 大阪府大阪市
                  weightKg: 10
                  sizeCm: "40x30x20"
                  note: 割れ物注意
      responses:
        "200":
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateShipmentResponse"
              examples:
                example:
                  value:
                    trackingId: QS-xxxxxxxx
                    status: pending
                    createdAt: "2026-04-03T10:00:00+09:00"
                    validationWarnings: []
        "400":
          description: Bad Request (missing required fields, weight over limit, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /shipments/{trackingId}:
    get:
      operationId: getShipment
      summary: Get a shipment
      description: Get an existing shipment by tracking ID.
      parameters:
        - in: path
          name: trackingId
          required: true
          schema:
            type: string
          description: Tracking identifier (e.g., QS-001)
      responses:
        "200":
          description: Shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetShipmentResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    CreateShipmentRequest:
      type: object
      additionalProperties: false
      required:
        - recipientName
        - from
        - to
      properties:
        senderName:
          type: string
          description: Sender name.
          example: 田中太郎
        recipientName:
          type: string
          description: Recipient name.
          example: 佐藤花子
        from:
          type: string
          description: Origin address.
          example: 東京都千代田区
        to:
          type: string
          description: Destination address.
          example: 大阪府大阪市
        weightKg:
          type: number
          format: double
          description: Weight in kilograms.
          example: 10
        sizeCm:
          type: string
          description: Package dimensions (e.g., "40x30x20").
          example: "40x30x20"
        note:
          type: string
          description: Optional note for the shipment.
          example: 割れ物注意
    CreateShipmentResponse:
      type: object
      additionalProperties: false
      required:
        - trackingId
        - status
        - createdAt
        - validationWarnings
      properties:
        trackingId:
          type: string
          example: QS-xxxxxxxx
        status:
          type: string
          example: pending
        createdAt:
          type: string
          format: date-time
          example: "2026-04-03T10:00:00+09:00"
        validationWarnings:
          type: array
          items:
            type: string
          example: []
    GetShipmentResponse:
      type: object
      additionalProperties: false
      required:
        - trackingId
        - status
        - recipientName
        - from
        - to
        - createdAt
      properties:
        trackingId:
          type: string
          example: QS-001
        status:
          type: string
          example: delivered
        senderName:
          type: string
          example: 田中太郎
        recipientName:
          type: string
          example: 佐藤花子
        from:
          type: string
          example: 東京都千代田区
        to:
          type: string
          example: 大阪府大阪市
        weightKg:
          type: number
          format: double
          example: 10
        sizeCm:
          type: string
          example: "40x30x20"
        note:
          type: string
          example: 割れ物注意
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:00:00+09:00"
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: true
          description: Minimal error payload.
          properties:
            code:
              type: string
              example: BadRequest
            message:
              type: string
              example: Invalid request
