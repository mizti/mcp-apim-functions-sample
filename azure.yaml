name: mcp-apim-functions-sample
metadata:
  template: mcp-apim-functions-sample

pipeline:
  variables:
    - DEPLOY_APIM

services:
  mcp:
    project: src/mcp_function
    language: python
    host: function
  rest:
    project: src/rest_function
    language: python
    host: function

infra:
  path: infra

prompt:
  - name: DEPLOY_APIM
    type: string
    message: "Deploy API Management? (yes/no)"
    default: "yes"
  - name: EXISTING_APIM_NAME
    type: string
    message: "Existing APIM instance name (leave empty if deploying new)"
    default: ""
